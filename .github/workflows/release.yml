name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get file size
        id: size
        run: |
          SIZE=$(wc -c < index.html)
          SIZE_KB=$((SIZE / 1024))
          echo "SIZE_KB=${SIZE_KB}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          zip -j "SecureStay-Analytics-${{ steps.version.outputs.VERSION }}.zip" index.html README.md 2>/dev/null || \
          zip -j "SecureStay-Analytics-${{ steps.version.outputs.VERSION }}.zip" index.html

      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: SecureStay Analytics ${{ steps.version.outputs.VERSION }}
          body: |
            ## SecureStay: Analytics — ${{ steps.version.outputs.VERSION }}

            **Single-file audit & compliance platform** for physical security, QM, and IT governance.

            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            **Bundle size:** `${{ steps.size.outputs.SIZE_KB }} KB` (self-contained, no server required)

            ### Usage
            Download `index.html` and open in any modern browser. No installation required.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: SecureStay-Analytics-${{ steps.version.outputs.VERSION }}.zip
          asset_name: SecureStay-Analytics-${{ steps.version.outputs.VERSION }}.zip
          asset_content_type: application/zip
